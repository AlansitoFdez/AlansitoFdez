# Archivo: .github/workflows/snake.yml
# Colócalo en tu repo AlansitoFdez/.github/workflows/snake.yml

name: Generate Snake 🐍

on:
  schedule:
    - cron: "0 */6 * * *"   # Se actualiza cada 6 horas
  workflow_dispatch:          # También puedes lanzarlo a mano

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: AlansitoFdez
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
